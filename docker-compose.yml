version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: review_intel_backend
    volumes:
      - ./backend:/app
      - model_cache:/app/model_cache
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./sentiment_platform.db
      - JWT_SECRET=4f2a7b8e9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2b3c4d5e6f
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - MODEL_CACHE_DIR=/app/model_cache
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: review_intel_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  model_cache:
    driver: local
